# Spring Boot Application Properties (Fixed)

spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:itemdb}
spring.datasource.username=${DB_USERNAME:itemapp_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.datasource.hikari.pool-name=ItemHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=${SERVER_PORT:8080}

---

修正說明：

1. **密碼明文洩漏**：`spring.datasource.password` 改為 `${DB_PASSWORD}`，不提供預設值，強制要求從環境變數注入，避免憑證寫死在設定檔中。

2. **最小權限原則**：`spring.datasource.username` 預設值從 `root` 改為 `itemapp_user`，代表一個僅具備 `items` 資料表 CRUD 所需權限的專屬帳號，需搭配 DB 端授權腳本建立該帳號。

3. **DDL 自動變更風險**：`spring.jpa.hibernate.ddl-auto` 從 `update` 改為 `validate`，啟動時只驗證 Entity 與現有 schema 是否一致，不會自動修改資料表結構，schema 變更改由 Flyway 或 Liquibase 等版控工具管理。